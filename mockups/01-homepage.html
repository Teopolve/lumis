document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>lumis — illuminate your search<\u002Ftitle>\n\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"3f58d39b-b864-4337-83cc-5ac612744d89\">\n<style>/* ════════════════════════════════════════════════════════════════\n   LUMIS — Colors & Type Tokens\n   The world's first AI-native search engine.\n   Editorial. Calm. Trustworthy.\n   ════════════════════════════════════════════════════════════════ */\n\n/* Fonts — all self-hosted brand TTFs in /fonts\n   — Instrument Serif (display, italic)\n   — Geist variable (body/UI) — PRIMARY\n   — Geist Mono variable (code/data)\n   — Nunito variable (available but unused; see README → Font Substitutions) */\n\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"320751e1-0f58-444d-803d-d849b9ff0fb9\") format('truetype');\n}\n\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"766e19ea-1af6-48ef-ad5c-9512cd6342c1\") format('truetype');\n}\n\n@font-face {\n  font-family: 'Geist';\n  font-style: normal;\n  font-weight: 100 900;\n  font-display: swap;\n  src: url(\"bd0e4e8f-384c-4efd-882d-f60c23f78b53\") format('truetype-variations');\n}\n\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 100 900;\n  font-display: swap;\n  src: url(\"ea47c1fd-557e-4881-9c01-0246e669564f\") format('truetype-variations');\n}\n\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 200 1000;\n  font-display: swap;\n  src: url(\"8f504219-dccc-4e26-bf49-460694465e7c\") format('truetype-variations');\n}\n\n@font-face {\n  font-family: 'Nunito';\n  font-style: italic;\n  font-weight: 200 1000;\n  font-display: swap;\n  src: url(\"549a40c4-03bd-433e-ac3c-81358f41aee6\") format('truetype-variations');\n}\n\n:root {\n  /* ──────────────────────────────────────────────\n     SURFACES — deep cosmic, always dark theme\n     ────────────────────────────────────────────── */\n  --surface-base:    #0B0D12;   /* page background */\n  --surface-raised:  #131722;   /* cards, panels */\n  --surface-overlay: #1A1F2E;   /* inputs, chips */\n  --surface-hover:   #222838;   /* hover state on raised */\n\n  /* ──────────────────────────────────────────────\n     TEXT\n     ────────────────────────────────────────────── */\n  --text-primary:   #F4F4F5;\n  --text-secondary: #A1A1AA;\n  --text-muted:     #71717A;\n  --text-subtle:    #52525B;\n\n  /* Semantic aliases */\n  --fg1: var(--text-primary);\n  --fg2: var(--text-secondary);\n  --fg3: var(--text-muted);\n  --fg4: var(--text-subtle);\n\n  /* ──────────────────────────────────────────────\n     BORDERS\n     ────────────────────────────────────────────── */\n  --border-subtle:  #1F2430;\n  --border-default: #27272A;\n  --border-strong:  #3F3F46;\n\n  /* ──────────────────────────────────────────────\n     BRAND — Lumis Amber (the soul; illumination only)\n     ────────────────────────────────────────────── */\n  --lumis-50:  #FEF8E7;   /* Mist */\n  --lumis-100: #FDEEC4;   /* Halo */\n  --lumis-200: #FCDF91;\n  --lumis-300: #FACB58;   /* Dawn */\n  --lumis-400: #F5B82E;   /* for italic/display accents */\n  --lumis-500: #F5B82E;   /* PRIMARY — core brand */\n  --lumis-600: #D8971A;   /* Deep */\n  --lumis-700: #A47013;   /* Ember */\n\n  /* ──────────────────────────────────────────────\n     TRUST BLUE — data, sources, verifications\n     ────────────────────────────────────────────── */\n  --trust-400: #60A5FA;\n  --trust-500: #3B82F6;\n  --trust-600: #2563EB;\n\n  /* ──────────────────────────────────────────────\n     SEMANTIC — trust-score signals\n     ────────────────────────────────────────────── */\n  --success: #10B981;   /* high trust */\n  --warning: #F59E0B;   /* medium trust */\n  --error:   #EF4444;   /* low trust */\n  --info:    #06B6D4;\n\n  /* ──────────────────────────────────────────────\n     TYPOGRAPHY\n     ────────────────────────────────────────────── */\n  --font-display: 'Instrument Serif', 'Times New Roman', Georgia, serif;\n  --font-body:    'Geist', -apple-system, 'SF Pro Text', system-ui, sans-serif;\n  --font-mono:    'Geist Mono', ui-monospace, 'SF Mono', 'Menlo', monospace;\n\n  /* ──────────────────────────────────────────────\n     SPACING — 4px base. breathe generously.\n     ────────────────────────────────────────────── */\n  --s-1: 0.25rem;   /*   4px */\n  --s-2: 0.5rem;    /*   8px */\n  --s-3: 0.75rem;   /*  12px */\n  --s-4: 1rem;      /*  16px */\n  --s-5: 1.5rem;    /*  24px */\n  --s-6: 2rem;      /*  32px */\n  --s-7: 3rem;      /*  48px */\n  --s-8: 4rem;      /*  64px */\n  --s-9: 6rem;      /*  96px */\n  --s-10: 8rem;     /* 128px */\n\n  /* ──────────────────────────────────────────────\n     RADII\n     ────────────────────────────────────────────── */\n  --radius-sm:   6px;\n  --radius-md:   10px;\n  --radius-lg:   16px;\n  --radius-xl:   24px;\n  --radius-full: 999px;\n\n  /* ──────────────────────────────────────────────\n     SHADOWS + GLOW\n     ────────────────────────────────────────────── */\n  --shadow-sm:   0 1px 2px rgba(0,0,0,.3);\n  --shadow-md:   0 4px 12px rgba(0,0,0,.25);\n  --shadow-lg:   0 12px 40px rgba(0,0,0,.35);\n  --shadow-glow: 0 0 40px rgba(245,184,46,.15);\n  --shadow-glow-strong: 0 0 40px rgba(245,184,46,.4), 0 0 80px rgba(245,184,46,.2);\n\n  /* ──────────────────────────────────────────────\n     MOTION — max 400ms. intentional only.\n     ────────────────────────────────────────────── */\n  --dur-hover:     150ms;\n  --dur-fade:      200ms;\n  --dur-slide:     300ms;\n  --dur-reveal:    400ms;\n  --dur-synthesis: 1200ms;  /* narrative moments only */\n  --ease-default:  cubic-bezier(.25, .1, .25, 1);\n  --ease-bounce:   cubic-bezier(.68, -.55, .27, 1.55);\n}\n\n/* ════════════════════════════════════════════════════════════════\n   BASE — page reset + editorial defaults\n   ════════════════════════════════════════════════════════════════ */\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-body);\n  background: var(--surface-base);\n  color: var(--text-primary);\n  line-height: 1.5;\n  font-weight: 400;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n}\n\n/* ════════════════════════════════════════════════════════════════\n   TYPE SCALE — semantic classes\n   Display = Instrument Serif. Body/UI = Geist. Data = Geist Mono.\n   ════════════════════════════════════════════════════════════════ */\n\n.display-xl,\nh1.display {\n  font-family: var(--font-display);\n  font-size: clamp(3rem, 8vw, 5rem);   /* ~80px */\n  line-height: 1.0;\n  letter-spacing: -0.03em;\n  font-weight: 400;\n}\n\n.display-lg {\n  font-family: var(--font-display);\n  font-size: 3.5rem;                    /* 56px */\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  font-weight: 400;\n}\n\n.display-md {\n  font-family: var(--font-display);\n  font-size: 2.5rem;                    /* 40px */\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  font-weight: 400;\n}\n\n/* Italic = emphasis. Use sparingly, often with --lumis-400. */\n.display-xl em, .display-lg em, .display-md em,\nh1.display em, h2.display em {\n  font-style: italic;\n  color: var(--lumis-400);\n}\n\nh1, .t-h1 {\n  font-family: var(--font-body);\n  font-size: 2.25rem;                   /* 36px */\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  font-weight: 600;\n}\n\nh2, .t-h2 {\n  font-family: var(--font-body);\n  font-size: 1.75rem;                   /* 28px */\n  line-height: 1.2;\n  font-weight: 600;\n}\n\nh3, .t-h3 {\n  font-family: var(--font-body);\n  font-size: 1.25rem;                   /* 20px */\n  line-height: 1.3;\n  font-weight: 500;\n}\n\np, .t-body {\n  font-size: 1rem;                      /* 16px */\n  line-height: 1.6;\n  color: var(--text-primary);\n}\n\n.t-lead {\n  font-size: 1.25rem;\n  line-height: 1.6;\n  color: var(--text-secondary);\n}\n\n.t-small {\n  font-size: 0.875rem;                  /* 14px */\n  line-height: 1.5;\n  color: var(--text-secondary);\n}\n\n.t-mono, code, pre {\n  font-family: var(--font-mono);\n  font-size: 0.875rem;\n  line-height: 1.5;\n}\n\n/* Amber-tinted inline mono = data, trust, scores */\n.t-mono-accent {\n  font-family: var(--font-mono);\n  font-size: 0.875rem;\n  color: var(--lumis-400);\n}\n\n/* Editorial eyebrow — uppercase mono label */\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 0.75rem;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--lumis-500);\n}\n\n/* Section label — smaller eyebrow */\n.section-label {\n  font-family: var(--font-mono);\n  font-size: 0.75rem;\n  letter-spacing: 0.15em;\n  text-transform: uppercase;\n  color: var(--lumis-500);\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; padding: 0; min-height: 100vh; }\n  body {\n    background: var(--surface-base);\n    color: var(--text-primary);\n    font-family: var(--font-body);\n    overflow-x: hidden;\n    min-height: 100vh;\n  }\n  ::selection { background: rgba(245,184,46,.3); color: var(--text-primary); }\n\n  /* ──────────────────────────────────────────────\n     Atmospheric overlays\n     ────────────────────────────────────────────── */\n  /* Grain — fixed, barely visible, non-interactive */\n  .grain {\n    position: fixed; inset: 0; pointer-events: none; z-index: 100;\n    opacity: 0.03;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n  }\n\n  /* Radial amber glow behind the wordmark */\n  .stage-glow {\n    position: absolute;\n    left: 50%; top: 38%;\n    width: 800px; height: 800px;\n    transform: translate(-50%, -50%);\n    pointer-events: none;\n    background: radial-gradient(circle, rgba(245,184,46,0.08) 0%, rgba(245,184,46,0.03) 35%, transparent 60%);\n    z-index: 0;\n  }\n\n  /* ──────────────────────────────────────────────\n     Page layout — centered slightly above middle (42%)\n     ────────────────────────────────────────────── */\n  .page {\n    position: relative;\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: flex-start;\n    z-index: 1;\n  }\n\n  .stage {\n    width: 100%;\n    max-width: 700px;\n    padding: 0 32px;\n    margin-top: 22vh;            /* content top sits ~22vh from top;\n                                    the wordmark block's visual center lands ~42% down */\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    position: relative;\n    z-index: 2;\n    animation: lumisIn 700ms cubic-bezier(.25,.1,.25,1) both;\n  }\n  @keyframes lumisIn {\n    from { opacity: 0; transform: translateY(8px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ──────────────────────────────────────────────\n     Wordmark\n     ────────────────────────────────────────────── */\n  .wordmark {\n    display: flex;\n    align-items: center;\n    gap: 20px;\n    line-height: 1;\n  }\n  .dot {\n    width: 18px; height: 18px; border-radius: 999px;\n    background: #F5B82E;\n    box-shadow:\n      0 0 30px 2px rgba(245,184,46,0.65),\n      0 0 60px 8px rgba(245,184,46,0.25);\n    animation: dotPulse 3s ease-in-out infinite;\n    flex-shrink: 0;\n    /* Nudge down a hair so it sits on the baseline of \"lumis\" */\n    transform: translateY(6px);\n  }\n  @keyframes dotPulse {\n    0%, 100% {\n      opacity: 1;\n      box-shadow: 0 0 30px 2px rgba(245,184,46,0.65), 0 0 60px 8px rgba(245,184,46,0.25);\n    }\n    50% {\n      opacity: 0.85;\n      box-shadow: 0 0 24px 2px rgba(245,184,46,0.45), 0 0 48px 8px rgba(245,184,46,0.15);\n    }\n  }\n  .wordmark-text {\n    font-family: var(--font-display);\n    font-size: 96px;\n    font-weight: 400;\n    line-height: 1;\n    letter-spacing: -0.02em;\n    color: var(--text-primary);\n  }\n\n  .tagline {\n    margin-top: 8px;\n    font-family: var(--font-display);\n    font-style: italic;\n    font-size: 22px;\n    color: var(--text-secondary);\n    line-height: 1.3;\n    letter-spacing: 0.005em;\n  }\n\n  /* ──────────────────────────────────────────────\n     Search bar\n     ────────────────────────────────────────────── */\n  .search-wrap { width: 100%; margin-top: 64px; position: relative; }\n  .search {\n    display: flex;\n    align-items: center;\n    width: 100%;\n    height: 64px;\n    padding: 0 14px 0 24px;\n    gap: 16px;\n    background: var(--surface-overlay);\n    border: 1px solid var(--border-strong);\n    border-radius: 999px;\n    transition:\n      border-color 200ms var(--ease-default),\n      box-shadow   200ms var(--ease-default),\n      background   200ms var(--ease-default);\n  }\n  .search:hover { border-color: #52525B; }\n  .search.is-focused,\n  .search:focus-within {\n    border-color: var(--lumis-500);\n    box-shadow: 0 0 0 4px rgba(245,184,46,0.18);\n  }\n  .search-icon {\n    color: var(--text-muted);\n    flex-shrink: 0;\n    display: inline-flex;\n    transition: color 200ms var(--ease-default);\n  }\n  .search:focus-within .search-icon { color: var(--text-secondary); }\n\n  .search-input {\n    flex: 1;\n    background: transparent;\n    border: 0;\n    outline: 0;\n    color: var(--text-primary);\n    font-family: var(--font-body);\n    font-size: 18px;\n    font-weight: 400;\n    letter-spacing: -0.005em;\n    padding: 0;\n    caret-color: var(--lumis-500);\n  }\n  .search-input::placeholder { color: var(--text-muted); font-weight: 400; }\n\n  .kbd {\n    display: inline-flex;\n    align-items: center;\n    gap: 3px;\n    font-family: var(--font-mono);\n    font-size: 12px;\n    font-weight: 500;\n    color: var(--text-secondary);\n    background: var(--surface-base);\n    border: 1px solid #27272A;\n    padding: 4px 10px;\n    border-radius: 4px;\n    flex-shrink: 0;\n    letter-spacing: 0.02em;\n    user-select: none;\n    transition: color 200ms var(--ease-default), border-color 200ms var(--ease-default);\n  }\n  .search:focus-within .kbd {\n    color: var(--text-primary);\n    border-color: #3F3F46;\n  }\n\n  /* ──────────────────────────────────────────────\n     Suggestion chips\n     ────────────────────────────────────────────── */\n  .chips {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 10px;\n    margin-top: 40px;\n    justify-content: center;\n  }\n  .chip {\n    font-family: var(--font-body);\n    font-size: 14px;\n    font-weight: 400;\n    color: var(--text-secondary);\n    background: #131722;\n    border: 1px solid #1F2430;\n    padding: 8px 16px;\n    border-radius: 999px;\n    cursor: pointer;\n    transition:\n      border-color 150ms var(--ease-default),\n      color        150ms var(--ease-default),\n      background   150ms var(--ease-default),\n      transform    150ms var(--ease-default);\n    white-space: nowrap;\n    line-height: 1.3;\n  }\n  .chip:hover {\n    border-color: var(--lumis-500);\n    color: var(--text-primary);\n  }\n  .chip:active { transform: translateY(0); opacity: 0.9; }\n\n  /* ──────────────────────────────────────────────\n     Footer\n     ────────────────────────────────────────────── */\n  .footer {\n    position: fixed;\n    left: 0; right: 0; bottom: 0;\n    padding: 0 32px 32px 32px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 24px;\n    z-index: 3;\n    pointer-events: none;         /* let it cover content visually but keep inner clickable */\n  }\n  .footer > * { pointer-events: auto; }\n  .footer-left {\n    font-family: var(--font-mono);\n    font-size: 12px;\n    color: var(--text-subtle);\n    display: inline-flex;\n    align-items: baseline;\n    gap: 10px;\n    letter-spacing: 0.02em;\n  }\n  .footer-left .fdot {\n    display: inline-block;\n    width: 7px; height: 7px; border-radius: 999px;\n    background: #F5B82E;\n    box-shadow: 0 0 10px rgba(245,184,46,0.5);\n    transform: translateY(1px);\n  }\n  .footer-left .fbrand {\n    font-family: var(--font-display);\n    font-style: normal;\n    font-size: 14px;\n    color: var(--text-muted);\n    letter-spacing: 0;\n  }\n  .footer-nav {\n    display: inline-flex;\n    gap: 28px;\n  }\n  .footer-link {\n    font-family: var(--font-body);\n    font-size: 13px;\n    color: var(--text-secondary);\n    text-decoration: none;\n    letter-spacing: 0.005em;\n    transition: color 150ms var(--ease-default);\n  }\n  .footer-link:hover { color: var(--lumis-500); }\n\n  /* ──────────────────────────────────────────────\n     Tweaks — floating toggle + pop-up panel\n     ────────────────────────────────────────────── */\n  /* Toggle button: a small floating pill. Shown only when edit mode\n     is available (activated by the toolbar toggle). */\n  .tweaks-toggle {\n    position: fixed;\n    right: 24px; bottom: 80px;\n    z-index: 201;\n    display: none;             /* shown via .is-available */\n    align-items: center;\n    gap: 8px;\n    background: var(--surface-raised);\n    border: 1px solid var(--border-default);\n    color: var(--text-secondary);\n    font-family: var(--font-mono);\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    padding: 10px 14px;\n    border-radius: 999px;\n    cursor: pointer;\n    box-shadow: 0 6px 20px rgba(0,0,0,.35);\n    transition: all 150ms var(--ease-default);\n  }\n  .tweaks-toggle.is-available { display: inline-flex; }\n  .tweaks-toggle:hover {\n    border-color: var(--lumis-500);\n    color: var(--text-primary);\n  }\n  .tweaks-toggle .tdot {\n    width: 7px; height: 7px; border-radius: 999px;\n    background: var(--lumis-500);\n    box-shadow: 0 0 8px rgba(245,184,46,0.6);\n  }\n  .tweaks-toggle .caret { color: var(--text-muted); margin-left: 2px; }\n  .tweaks-toggle.is-open .caret { color: var(--lumis-500); }\n\n  /* The pop-up panel itself. */\n  .tweaks {\n    position: fixed;\n    right: 24px; bottom: 130px;      /* sits just above the toggle */\n    width: 280px;\n    background: var(--surface-raised);\n    border: 1px solid var(--border-default);\n    border-radius: 16px;\n    padding: 18px;\n    z-index: 200;\n    box-shadow: 0 12px 40px rgba(0,0,0,.45);\n    display: none;\n    font-family: var(--font-body);\n    transform-origin: bottom right;\n    animation: tweaksIn 180ms var(--ease-default) both;\n  }\n  @keyframes tweaksIn {\n    from { opacity: 0; transform: translateY(6px) scale(0.98); }\n    to   { opacity: 1; transform: translateY(0)   scale(1); }\n  }\n  .tweaks.is-open { display: block; }\n\n  .tweaks-head {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 14px;\n  }\n  .tweaks-title {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--lumis-500);\n    margin: 0;\n  }\n  .tweaks-close {\n    background: transparent;\n    border: 0;\n    color: var(--text-muted);\n    cursor: pointer;\n    width: 24px; height: 24px;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    border-radius: 6px;\n    transition: all 150ms var(--ease-default);\n  }\n  .tweaks-close:hover {\n    color: var(--text-primary);\n    background: var(--surface-overlay);\n  }\n  .tweaks-row { margin-bottom: 14px; }\n  .tweaks-row:last-child { margin-bottom: 0; }\n  .tweaks-label {\n    display: block;\n    font-family: var(--font-mono);\n    font-size: 10px;\n    color: var(--text-muted);\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    margin-bottom: 6px;\n  }\n  .seg {\n    display: flex;\n    background: var(--surface-overlay);\n    border: 1px solid var(--border-default);\n    border-radius: 8px;\n    padding: 2px;\n    gap: 2px;\n  }\n  .seg button {\n    flex: 1;\n    background: transparent;\n    border: 0;\n    color: var(--text-secondary);\n    font-family: var(--font-body);\n    font-size: 12px;\n    padding: 6px 8px;\n    border-radius: 6px;\n    cursor: pointer;\n    transition: all 150ms var(--ease-default);\n  }\n  .seg button:hover { color: var(--text-primary); }\n  .seg button.is-on {\n    background: var(--surface-hover);\n    color: var(--lumis-500);\n  }\n\n  /* ──────────────────────────────────────────────\n     Small screens\n     ────────────────────────────────────────────── */\n  @media (max-width: 640px) {\n    .stage { margin-top: 18vh; padding: 0 24px; }\n    .wordmark-text { font-size: 72px; }\n    .dot { width: 14px; height: 14px; transform: translateY(5px); }\n    .tagline { font-size: 18px; }\n    .search { height: 58px; padding: 0 10px 0 20px; }\n    .search-input { font-size: 16px; }\n    .chips { gap: 8px; margin-top: 32px; }\n    .footer { flex-direction: column; gap: 12px; padding: 0 24px 24px; align-items: center; }\n    .footer-nav { gap: 20px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"grain\" aria-hidden=\"true\"><\u002Fdiv>\n\n<div class=\"page\">\n  <div class=\"stage-glow\" aria-hidden=\"true\"><\u002Fdiv>\n\n  <main class=\"stage\" role=\"main\">\n\n    <!-- Wordmark -->\n    <div class=\"wordmark\" aria-label=\"LUMIS\">\n      <span class=\"dot\" aria-hidden=\"true\"><\u002Fspan>\n      <span class=\"wordmark-text\">lumis<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Tagline -->\n    <p class=\"tagline\" id=\"tagline\">Illuminate your search.<\u002Fp>\n\n    <!-- Search -->\n    <form class=\"search-wrap\" onsubmit=\"event.preventDefault(); handleSubmit();\">\n      <label class=\"search\" id=\"search\">\n        <span class=\"search-icon\" aria-hidden=\"true\">\n          <!-- Lucide-style magnifier, 20px, stroke 2 -->\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle>\n            <path d=\"m20 20-3.5-3.5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fspan>\n        <input id=\"q\" class=\"search-input\" type=\"text\" autocomplete=\"off\" spellcheck=\"false\" placeholder=\"Ask LUMIS anything — it will answer with sources.\" aria-label=\"Ask LUMIS anything\">\n        <span class=\"kbd\" aria-hidden=\"true\">⌘&nbsp;K<\u002Fspan>\n      <\u002Flabel>\n    <\u002Fform>\n\n    <!-- Suggestion chips -->\n    <div class=\"chips\" id=\"chips\" role=\"list\"><\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- Footer -->\n<footer class=\"footer\">\n  <div class=\"footer-left\">\n    <span class=\"fdot\" aria-hidden=\"true\"><\u002Fspan>\n    <span class=\"fbrand\">lumis<\u002Fspan>\n    <span>© 2026<\u002Fspan>\n  <\u002Fdiv>\n  <nav class=\"footer-nav\" aria-label=\"Footer\">\n    <a class=\"footer-link\" href=\"#about\">About<\u002Fa>\n    <a class=\"footer-link\" href=\"#principles\">Principles<\u002Fa>\n    <a class=\"footer-link\" href=\"#privacy\">Privacy<\u002Fa>\n  <\u002Fnav>\n<\u002Ffooter>\n\n<!-- Tweaks toggle (floating pill) + pop-up panel -->\n<button type=\"button\" class=\"tweaks-toggle\" id=\"tweaks-toggle\" aria-label=\"Open Tweaks\" aria-expanded=\"false\">\n  <span class=\"tdot\" aria-hidden=\"true\"><\u002Fspan>\n  <span>Tweaks<\u002Fspan>\n  <svg class=\"caret\" width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n<\u002Fbutton>\n\n<aside class=\"tweaks\" id=\"tweaks\" aria-label=\"Tweaks\" role=\"dialog\">\n  <div class=\"tweaks-head\">\n    <h2 class=\"tweaks-title\">Tweaks<\u002Fh2>\n    <button type=\"button\" class=\"tweaks-close\" id=\"tweaks-close\" aria-label=\"Close Tweaks\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label class=\"tweaks-label\">Tagline<\u002Flabel>\n    <div class=\"seg\" id=\"seg-tagline\">\n      <button data-val=\"illuminate\">Illuminate<\u002Fbutton>\n      <button data-val=\"ask\">Ask<\u002Fbutton>\n      <button data-val=\"seek\">Seek<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label class=\"tweaks-label\">Suggestion set<\u002Flabel>\n    <div class=\"seg\" id=\"seg-chips\">\n      <button data-val=\"default\">Default<\u002Fbutton>\n      <button data-val=\"research\">Research<\u002Fbutton>\n      <button data-val=\"everyday\">Everyday<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label class=\"tweaks-label\">Dot pulse<\u002Flabel>\n    <div class=\"seg\" id=\"seg-pulse\">\n      <button data-val=\"on\">On<\u002Fbutton>\n      <button data-val=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tweaks-row\">\n    <label class=\"tweaks-label\">Glow intensity<\u002Flabel>\n    <div class=\"seg\" id=\"seg-glow\">\n      <button data-val=\"soft\">Soft<\u002Fbutton>\n      <button data-val=\"medium\">Medium<\u002Fbutton>\n      <button data-val=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Faside>\n\n<script>\n  // ───────────────────────────────────────────────\n  // Tweakable defaults — persisted via host rewrite.\n  // Keep this block valid JSON between the markers.\n  // ───────────────────────────────────────────────\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"tagline\": \"illuminate\",\n    \"chips\": \"default\",\n    \"pulse\": \"on\",\n    \"glow\": \"soft\"\n  }/*EDITMODE-END*/;\n\n  // Content variants ------------------------------------------------------\n  const TAGLINES = {\n    illuminate: \"Illuminate your search.\",\n    ask:        \"Ask. Then know.\",\n    seek:       \"For those who seek.\"\n  };\n\n  const CHIP_SETS = {\n    default: [\n      \"What's new in Alzheimer's research?\",\n      \"Compare Next.js vs Remix\",\n      \"How did remote work evolve 2019–2026?\",\n      \"Show me 2026 climate data\"\n    ],\n    research: [\n      \"Summarize this week's Nature papers\",\n      \"Sources on CRISPR long-term effects\",\n      \"Compare GPT-5 and Claude Opus 5 benchmarks\",\n      \"Timeline of AI safety regulation\"\n    ],\n    everyday: [\n      \"What's happening in the news today?\",\n      \"Best non-fiction published in 2025\",\n      \"Explain the new tax rules for freelancers\",\n      \"Coffee brewing methods compared\"\n    ]\n  };\n\n  // Apply state to DOM ----------------------------------------------------\n  function apply() {\n    // Tagline\n    document.getElementById('tagline').textContent =\n      TAGLINES[TWEAKS.tagline] || TAGLINES.illuminate;\n\n    // Chips\n    const wrap = document.getElementById('chips');\n    const list = CHIP_SETS[TWEAKS.chips] || CHIP_SETS.default;\n    wrap.innerHTML = '';\n    list.forEach(t => {\n      const b = document.createElement('button');\n      b.type = 'button';\n      b.className = 'chip';\n      b.setAttribute('role', 'listitem');\n      b.textContent = t;\n      b.addEventListener('click', () => {\n        const q = document.getElementById('q');\n        q.value = t;\n        q.focus();\n      });\n      wrap.appendChild(b);\n    });\n\n    // Pulse\n    const dot = document.querySelector('.dot');\n    dot.style.animation = TWEAKS.pulse === 'off' ? 'none' : '';\n\n    // Glow intensity\n    const glow = document.querySelector('.stage-glow');\n    if (TWEAKS.glow === 'off') {\n      glow.style.opacity = '0';\n    } else if (TWEAKS.glow === 'medium') {\n      glow.style.opacity = '1.6';\n      glow.style.filter = 'none';\n    } else {\n      glow.style.opacity = '1';\n      glow.style.filter = 'none';\n    }\n\n    // Sync toggle button states\n    syncSeg('seg-tagline', TWEAKS.tagline);\n    syncSeg('seg-chips',   TWEAKS.chips);\n    syncSeg('seg-pulse',   TWEAKS.pulse);\n    syncSeg('seg-glow',    TWEAKS.glow);\n  }\n\n  function syncSeg(id, val) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    el.querySelectorAll('button').forEach(b => {\n      b.classList.toggle('is-on', b.dataset.val === val);\n    });\n  }\n\n  // Wire tweak buttons ----------------------------------------------------\n  function bindSeg(id, key) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    el.addEventListener('click', (e) => {\n      const btn = e.target.closest('button[data-val]');\n      if (!btn) return;\n      TWEAKS[key] = btn.dataset.val;\n      apply();\n      try {\n        window.parent.postMessage({\n          type: '__edit_mode_set_keys',\n          edits: { [key]: TWEAKS[key] }\n        }, '*');\n      } catch {}\n    });\n  }\n  bindSeg('seg-tagline', 'tagline');\n  bindSeg('seg-chips',   'chips');\n  bindSeg('seg-pulse',   'pulse');\n  bindSeg('seg-glow',    'glow');\n\n  // Keyboard shortcut: ⌘K / Ctrl+K focuses search -------------------------\n  document.addEventListener('keydown', (e) => {\n    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {\n      e.preventDefault();\n      document.getElementById('q').focus();\n    }\n    if (e.key === 'Escape') {\n      const q = document.getElementById('q');\n      if (document.activeElement === q) q.blur();\n    }\n  });\n\n  // Submit — stay in place, just a moment of focus glow ------------------\n  function handleSubmit() {\n    const q = document.getElementById('q');\n    if (!q.value.trim()) return;\n    // For this homepage prototype, submitting just flashes the focus state.\n    const s = document.getElementById('search');\n    s.classList.add('is-focused');\n    setTimeout(() => s.classList.remove('is-focused'), 400);\n  }\n\n  // Tweaks panel host protocol + pop-up behavior ------------------------\n  const panel  = document.getElementById('tweaks');\n  const toggle = document.getElementById('tweaks-toggle');\n  const closeBtn = document.getElementById('tweaks-close');\n\n  function openPanel() {\n    panel.classList.add('is-open');\n    toggle.classList.add('is-open');\n    toggle.setAttribute('aria-expanded', 'true');\n  }\n  function closePanel() {\n    panel.classList.remove('is-open');\n    toggle.classList.remove('is-open');\n    toggle.setAttribute('aria-expanded', 'false');\n  }\n  function setAvailable(on) {\n    toggle.classList.toggle('is-available', on);\n    if (!on) closePanel();\n  }\n\n  toggle.addEventListener('click', () => {\n    if (panel.classList.contains('is-open')) closePanel();\n    else openPanel();\n  });\n  closeBtn.addEventListener('click', closePanel);\n\n  // Close on Escape\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && panel.classList.contains('is-open')) {\n      closePanel();\n    }\n  });\n\n  // Close on outside click\n  document.addEventListener('mousedown', (e) => {\n    if (!panel.classList.contains('is-open')) return;\n    if (panel.contains(e.target) || toggle.contains(e.target)) return;\n    closePanel();\n  });\n\n  window.addEventListener('message', (e) => {\n    const d = e.data || {};\n    if (d.type === '__activate_edit_mode')   setAvailable(true);\n    if (d.type === '__deactivate_edit_mode') setAvailable(false);\n  });\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch {}\n\n  // Initial paint\n  apply();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
